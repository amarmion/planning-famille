<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planning Famille - Connexion</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            max-width: 450px;
            width: 100%;
        }

        .auth-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .auth-header h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        .auth-header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .auth-content {
            padding: 40px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 16px;
            margin-top: 10px;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.3);
        }

        .toggle-form {
            text-align: center;
            margin-top: 20px;
            font-size: 14px;
            color: #666;
        }

        .toggle-form a {
            color: #667eea;
            text-decoration: none;
            cursor: pointer;
            font-weight: 600;
        }

        .toggle-form a:hover {
            text-decoration: underline;
        }

        .hidden-form {
            display: none;
        }

        .message {
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: 600;
        }

        .message.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .message.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>

<body>
    <div class="auth-container">
        <div class="auth-header">
            <h1>📅 Planning Famille</h1>
            <p id="headerText">Créer un nouveau compte</p>
        </div>

        <div class="auth-content">
            <div id="message"></div>

            <!-- FORMULAIRE CONNEXION -->
            <form id="loginForm" class="hidden-form" onsubmit="handleLogin(event)">
                <h2 style="margin-bottom: 20px; color: #333;">Connexion</h2>
                
                <div class="form-group">
                    <label for="loginEmail">📧 Email :</label>
                    <input type="email" id="loginEmail" required>
                </div>

                <div class="form-group">
                    <label for="loginPassword">🔐 Mot de passe :</label>
                    <input type="password" id="loginPassword" required>
                </div>

                <button type="submit" class="submit-btn">🔓 Connexion</button>

                <div class="toggle-form">
                    Pas de compte ? <a onclick="toggleForm()">S'inscrire</a>
                </div>
            </form>

            <!-- FORMULAIRE INSCRIPTION -->
            <form id="signupForm" onsubmit="handleSignup(event)">
                <h2 style="margin-bottom: 20px; color: #333;">Créer un compte</h2>
                
                <div class="form-group">
                    <label for="signupName">👤 Nom :</label>
                    <input type="text" id="signupName" required>
                </div>

                <div class="form-group">
                    <label for="signupEmail">📧 Email :</label>
                    <input type="email" id="signupEmail" required>
                </div>

                <div class="form-group">
                    <label for="signupPassword">🔐 Mot de passe :</label>
                    <input type="password" id="signupPassword" required>
                </div>

                <button type="submit" class="submit-btn">✅ Créer un compte</button>

                <div class="toggle-form">
                    Vous avez déjà un compte ? <a onclick="toggleForm()">Se connecter</a>
                </div>
            </form>
        </div>
    </div>

    <!-- SCRIPTS FIREBASE -->
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.5.0/firebase-database.js"></script>

    <script>
        // ✅ VOTRE VRAIE CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyBYKeXpqIHzxvB8byZ-ujozhcrKRTpSibE",
            authDomain: "planning-famille-cda1a.firebaseapp.com",
            databaseURL: "https://planning-famille-cda1a-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "planning-famille-cda1a",
            storageBucket: "planning-famille-cda1a.firebasestorage.app",
            messagingSenderId: "720570302220",
            appId: "1:720570302220:web:d8e830783665b1ed2cd329",
            measurementId: "G-ZK8WGQW19G"
        };

        // Initialiser Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const database = firebase.database();

        console.log("✅ Firebase connecté!");

        function toggleForm() {
            document.getElementById('loginForm').classList.toggle('hidden-form');
            document.getElementById('signupForm').classList.toggle('hidden-form');
            document.getElementById('headerText').textContent = 
                document.getElementById('loginForm').classList.contains('hidden-form') 
                    ? 'Créer un nouveau compte' 
                    : 'Se connecter';
            document.getElementById('message').innerHTML = '';
        }

        function showMessage(text, type) {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;

            auth.signInWithEmailAndPassword(email, password)
                .then(() => {
                    showMessage('✅ Connexion réussie!', 'success');
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1000);
                })
                .catch((error) => {
                    showMessage('❌ Erreur: ' + error.message, 'error');
                });
        }

        function handleSignup(e) {
            e.preventDefault();
            const name = document.getElementById('signupName').value;
            const email = document.getElementById('signupEmail').value;
            const password = document.getElementById('signupPassword').value;

            auth.createUserWithEmailAndPassword(email, password)
                .then((result) => {
                    database.ref('families/' + result.user.uid).set({
                        owner: email,
                        members: [{
                            id: result.user.uid,
                            name: name,
                            email: email
                        }]
                    });

                    showMessage('✅ Compte créé! Redirection...', 'success');
                    setTimeout(() => {
                        window.location.href = "index.html";
                    }, 1500);
                })
                .catch((error) => {
                    showMessage('❌ Erreur: ' + error.message, 'error');
                });
        }
    </script>
</body>
</html>
